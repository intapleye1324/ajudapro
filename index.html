<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AjudaPro IA</title>
</head>

<body>

<h1>AjudaPro IA</h1>

<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="senha" placeholder="Senha"><br><br>

<button onclick="registrar()">Criar Conta</button>
<button onclick="login()">Entrar</button>

<hr>

<h3>Perguntar para IA</h3>
<textarea id="pergunta" placeholder="Digite sua pergunta"></textarea><br><br>
<button onclick="perguntar()">Perguntar</button>

<p id="resposta"></p>

<script>

const API = "https://ajudapro.onrender.com";

// cadastro
async function registrar() {
  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  alert("Conta criada!");
}

// login
async function login() {
  let res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  let data = await res.json();

  if(data.erro){
    alert(data.erro);
  } else {
    localStorage.setItem("user", email.value);
    alert("Logado!");
  }
}

// perguntar
async function perguntar(){

  resposta.innerText = "Pensando... (aguarde até 30s)";

  try {

    let res = await fetch(API + "/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        mensagem: pergunta.value
      })
    });

    let data = await res.json();

    if(data.resposta){
      resposta.innerText = data.resposta;
    } else {
      resposta.innerText = "Erro: " + data.erro;
    }

  } catch (err) {
    resposta.innerText = "Erro de conexão com servidor";
  }
}

</script>

</body>
</html>
