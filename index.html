<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AjudaPro IA</title>
</head>

<body>

<h1>AjudaPro IA</h1>

<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="senha" placeholder="Senha"><br><br>

<button onclick="registrar()">Criar Conta</button>
<button onclick="login()">Entrar</button>

<hr>

<h3>Perguntar para IA</h3>
<textarea id="pergunta" placeholder="Digite sua pergunta"></textarea><br><br>
<button onclick="perguntar()">Perguntar</button>

<p id="resposta"></p>

<script>

const API = : : https://ajudapro.onrender.com

// 📌 REGISTRAR
async function registrar() {
  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  alert("Conta criada!");
}

// 🔐 LOGIN
async function login() {
  let res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  let data = await res.json();

  if(data.erro){
    alert(data.erro);
  } else {
    localStorage.setItem("user", email.value);
    alert("Logado com sucesso!");
  }
}

// 🤖 PERGUNTAR
async function perguntar() {

  resposta.innerText = "Pensando...";

  let check = await fetch(API + "/check", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: localStorage.getItem("user")
    })
  });

  let acesso = await check.json();

  if(acesso.bloqueado){
    resposta.innerText = "Seu teste grátis acabou! Compre um plano.";
    return;
  }

  let res = await fetch(API + "/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      mensagem: pergunta.value
    })
  });

  let data = await res.json();

  resposta.innerText = data.resposta;
}

</script>

</body>
                                                            </html>
